<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8"><!--文字コードをUTF-8にする-->
	<meta name="supported-color-schemes" content="only light"><!--ダークモードを無効化する-->
	<meta name="viewport" content="width=device-width, initial-scale=1.0"><!--SmartPhone-->
	<meta name="description" content="盆栽 育てるニュースリンク集"><!--検索結果などに表示-->
	<title>BONSAI-NEWS</title>
	<style>
		/*---DEF ダークモード---*/
		/*HEADにダークモード(自前設定)の記述あったほうがよいかも？*/
		body {
			background-color: #1a1a2e;
			color: #e0e0e0;
			font-family: Meiryo UI, sans-serif;
			max-width: 800px;
			margin: 0;
			padding: 1rem;
		}
		h1 {color: #a0c4ff;}
		nav {color: #7fb3d3;}
		a {color: #90caf9;	text-decoration: none;}
		a:hover {text-decoration: underline;}
		
		/*---DEF ライトモード---*/
		body.light {
			background-color: #f5f5f5;
			color: #1a1a1a;
		}
		body.light h1 {color: #1a3a6e;}
		body.light nav {color: #2a5a8e;}
		body.light a {color: #1a6ab5;}

		/* 切り替えボタン */
		#toggle {
			position: fixed;
			top: 1rem;
			right: 1rem;
			padding: 0.4rem 0.8rem;
			cursor: pointer;
			border: 1px solid #888;
			border-radius: 4px;
			background: transparent;
			color: inherit;
		}
  	</style>
	<script>
		//---DEF DOMContentLoadedイベントで非同期処理を行う---//
		document.addEventListener('DOMContentLoaded', async () => {

			//トグルボタン制御（ダークモード）
			const toggleButton = document.getElementById('toggle');

			if (toggleButton) {
				toggleButton.addEventListener('click', () => {
					document.body.classList.toggle('light');
					toggleButton.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
				});
			}

			//データをとってくる（非同期）
			const JSON_FILE = 'links.json';
			//カテゴリをlinks.jsonと合わせて書いておくことで、HTML側のdiv idと対応させる。
			const categoryIds = ['economy', 'trusted', 'study', 'ai_recommend'];

			try {
				const response = await fetch(JSON_FILE);

				if (!response.ok) {
					throw new Error('HTTP ' + response.status);
				}
				//待機（データまち）
				const jsonData = await response.json();

				//カテゴリごとのデータを展開
				categoryIds.forEach((categoryId) => {
					const container = document.getElementById(categoryId);
					const category = jsonData[categoryId];

					if (!container || !category || !Array.isArray(category.links)) {
						return;
					}

					// 復号処理を後でここに入れる想定。
					// 各リンクをHTML用の<li>文字列にマッピングする。
					const linkItems = category.links.map((item) => {
						return `<li><a href="${item.url}">${item.title}</a></li>`;
					});

					// 連結して<ul>の中に流し込むための1つのHTML文字列にする。
					const html = linkItems.join('');

					// HTML に差し込むための文字列を組み立てる
					container.innerHTML = `
						<details>
							<summary>${category.label}</summary>
							<nav><ul>${html}</ul></nav>
						</details>
					`;
				});
			} catch (error) {
				//何かあったときここを通る
				console.error('読み込み失敗', error);
			}
		});
	</script>
</head>
<body>
	<div>
		<h1>わたし用のゆるいメモ&リンク置き場です。</h1>
		<p>コスパの良い能動的リンク集をつくり、ニュース時事問題もろもろの情報収集をめざし、<br>
		気が向いたときにちょっとずつ育てる盆栽スタイルで更新していきます。</p>
	</div>
	<div id="economy"></div>
	<div id="trusted"></div>
	<div id="study"></div>
	<div id="ai_recommend"></div>
	<div>
	<details>
		<summary id="Prev Updates">過去の履歴</summary>
		<nav>
			<ul>
				<li>2026/07/11-12：現在改装中です。</li>
				<li>2026/07/04-05：現在工事中です。</li>
			</ul>
		</nav>
	</details>
		<p>Copyright © 2026 okirakutei All rights reserved.</p>
	</div>
	<div>
		<button id="toggle" type="button" aria-label="テーマ切替">☀️</button>
	</div>
</body>
